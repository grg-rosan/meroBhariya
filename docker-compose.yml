services:
  db:
    image: postgis/postgis:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meroBhariya
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d meroBhariya"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672" 
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest            
      - RABBITMQ_DEFAULT_PASS=guest   
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s         
  server:
    build: ./server
    ports: 
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/meroBhariya
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=development
      - JWT_SECRET=c4c56025e38a80a4f176b39194c59f1609db98dd81f7f1ba9a920a9d9d6072ba      
      - JWT_EXPIRES_IN=7d  
    depends_on: 
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - server
  
volumes:
  postgres_data:
  rabbitmq_data: